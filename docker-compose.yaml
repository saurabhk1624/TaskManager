
services:
  task-api:
    build: .
    container_name: task-manager-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongo-db
    restart: unless-stopped

  mongo-db:
    image: mongo:7
    container_name: task-manager-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data: